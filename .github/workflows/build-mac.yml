name: 打包 Mac 版

# 手动触发，或推送代码时自动触发
on:
  workflow_dispatch:
  push:

jobs:
  build-macos:
    runs-on: macos-latest   # Apple 芯片云主机（排队快），配合 universal2 产出 Intel+Apple 通用包
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python (通用二进制 universal2)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        working-directory: tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: 打包 .app
        working-directory: tools
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --clean HtmlBase64ImageReplacer-mac.spec
          xattr -cr "dist/HTML图片替换工具.app" || true

      - name: 压缩 .app（保留权限）
        working-directory: tools/dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent "HTML图片替换工具.app" "HTML图片替换工具-mac.zip"

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: HTML图片替换工具-mac
          path: tools/dist/HTML图片替换工具-mac.zip
          if-no-files-found: error
