name: 打包 Mac 版

# 手动触发，或推送代码时自动触发
on:
  workflow_dispatch:
  push:

jobs:
  build-macos:
    runs-on: macos-latest   # Apple 芯片云主机（排队快），配合 universal2 产出 Intel+Apple 通用包
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python (通用二进制 universal2)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 PyInstaller
        working-directory: tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: 安装 Pillow(universal2，失败不阻断)
        working-directory: tools
        continue-on-error: true
        run: |
          # 强制把 Pillow 的 universal2(双架构) 版本装到 u2libs，供通用包打包使用。
          # 装不上也不影响出包，只是没有缩略图预览。
          set -x
          python -m pip install --only-binary=:all: \
            --platform macosx_13_0_universal2 \
            --target u2libs \
            pillow \
          || python -m pip install --only-binary=:all: \
            --platform macosx_10_13_universal2 \
            --target u2libs \
            pillow
          ls -la u2libs || true

      - name: 打包 .app
        working-directory: tools
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --clean HtmlBase64ImageReplacer-mac.spec
          xattr -cr "dist/HTML图片替换工具.app" || true

      - name: 压缩 .app（保留权限）
        working-directory: tools/dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent "HTML图片替换工具.app" "HTML图片替换工具-mac.zip"

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: HTML图片替换工具-mac
          path: tools/dist/HTML图片替换工具-mac.zip
          if-no-files-found: error
